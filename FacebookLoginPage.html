<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook – Login</title>

<!-- Bootstrap 5 CDN -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background-color:#f0f2f5;
    font-family: Helvetica, Arial, sans-serif;
}

.fb-logo{
    color:#1877f2;
    font-size:55px;
    font-weight:bold;
}

.login-card{
    border:none;
    border-radius:10px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.btn-primary{
    background-color:#1877f2;
    border:none;
    font-weight:bold;
}

.btn-success{
    background-color:#42b72a;
    border:none;
    font-weight:bold;
}

.footer-text{
    font-size:14px;
    color:gray;
}
</style>

</head>
<body>

<div class="container">
    <div class="row justify-content-center align-items-center vh-100">

        <!-- Left Side -->
        <div class="col-md-6 mb-4">
            <div class="fb-logo">facebook</div>
            <p class="fs-4">
                Facebook helps you connect and share with the people in your life.
            </p>
        </div>

        <!-- Right Side -->
        <div class="col-md-4">
            <div class="card login-card p-4">
                <form>
                    <input type="email" class="form-control mb-3" placeholder="Email address or phone number">
                    <input type="password" class="form-control mb-3" placeholder="Password">

                    <button class="btn btn-primary w-100 mb-3">Log In</button>

                    <div class="text-center">
                        <a href="#" class="text-decoration-none">Forgotten password?</a>
                    </div>

                    <hr>

                    <div class="text-center">
                        <button class="btn btn-success px-4">Create new account</button>
                    </div>
                </form>
            </div>

        </div>

    </div>
</div>

</body>
</html>
